name: Release
on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  publish_windows:
    name: "Publish Windows"
    runs-on: windows-2022

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build and release app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        shell: bash
        run: |
          # azureSignOptions is kept out of electron-builder.yaml so it can be omitted when
          # Azure Trusted Signing creds are absent (e.g. fork/dev test releases). With the
          # block present electron-builder always tries to sign and fails; without it, it
          # falls back to signtool, finds no cert, and skips signing (unsigned build). These
          # publisher/endpoint values are public config, not secrets, so they live here.
          if [ -n "$AZURE_CLIENT_ID" ]; then
            npm run release -- \
              -c.win.azureSignOptions.publisherName="Live Church Solutions" \
              -c.win.azureSignOptions.endpoint="https://wus2.codesigning.azure.net/" \
              -c.win.azureSignOptions.certificateProfileName="FreeShow" \
              -c.win.azureSignOptions.codeSigningAccountName="FreeShow"
          else
            npm run release
          fi

  publish_linux:
    name: "Publish Linux x64"
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install libraries
        run:
          |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev uuid-dev libltc-dev --fix-missing

      - name: Install dependencies
        run: npm ci

      - name: Build and release app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

  # This needs it's own build
  # https://github.com/ChurchApps/FreeShow/issues/562
  publish_linux_arm:
    name: "Publish Linux arm64"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install libraries
        run:
          |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev uuid-dev libltc-dev --fix-missing

      # WIDEVINE
      # - name: Use stock Electron on ARM64
      #   run: npm run replace-electron

      - name: Install dependencies
        run: npm ci

      - name: Install FPM
        run:
          |
          sudo apt-get install ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      # wait because this will only publish if the draft exists
      - name: Sleep for 1.5 minute
        run: sleep 90s
        shell: bash

      - name: Build and release app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_SYSTEM_FPM: true
        run: npm run release:arm64

  publish_mac:
    name: "Publish MacOS"
    runs-on: macos-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Change Python version: https://github.com/nodejs/node-gyp/issues/2869
      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # This probably does not make any difference.
      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: npm ci

      - name: Install dmg-license
        run: npm i dmg-license

      # for some reason the build command don't continue after the rollup build
      - name: Sleep for 3 minutes
        run: sleep 180
        shell: bash

      - name: Build and release app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLEID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLEIDPASS }}
          APPLE_TEAM_ID: ${{ secrets.APPLETEAMID }}
        run: |
          # When CSC_LINK isn't set as a repo secret, GitHub still exports it as an empty
          # string. electron-builder treats "" as a certificate path, resolves it to the
          # project dir, and fails with "<projectDir> not a file". Drop the empty signing
          # vars so the build runs unsigned when no certificate is configured.
          if [ -z "$CSC_LINK" ]; then unset CSC_LINK CSC_KEY_PASSWORD; fi
          npm run release
