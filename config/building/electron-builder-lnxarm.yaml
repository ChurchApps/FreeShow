appId: com.joinamazing.aplay-pro
productName: APlay Pro
artifactName: APlay-Pro-${version}-${arch}.${ext}

files:
    - build/electron/**
    - build/types/**
    - public/**
    - "!node_modules/@napi-rs"

extraResources:
    - from: node_modules/slideshow/
      to: slideshow
      filter:
          - connector-*

# linux

linux:
    asarUnpack:
        - node_modules/grandiose/**
    category: AudioVideo
    target:
        - AppImage
        - deb
        - rpm
    icon: build/public
