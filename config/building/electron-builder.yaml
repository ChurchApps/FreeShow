appId: app.freeshow
productName: FreeShow
artifactName: FreeShow-${version}-${arch}.${ext}

# WIDEVINE
# Use castlabs electron builds to get widevine support
# electronDownload:
#     mirror: https://github.com/castlabs/electron-releases/releases/download/

files:
    - build/electron/**
    - build/types/**
    - public/**
    - "!node_modules/@napi-rs"
    - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,test,tests}"
    - "!**/node_modules/*/{*.d.ts,*.ts,*.map}"
    - "!**/node_modules/{@types,typescript}/**"
    - "!**/node_modules/**/*.pdb"
    - "!**/node_modules/**/obj/**"

extraResources:
    - from: node_modules/slideshow/
      to: slideshow
      filter:
          - connector-*

# windows

win:
    target: NSIS
    icon: build/public/icon.png
    asarUnpack:
        - "**/node_modules/macadam/**/*.node"
        - "**/node_modules/libspotifyctl/**/*"
    # NOTE: win.azureSignOptions is intentionally NOT set here. electron-builder always
    # tries to Azure-sign whenever this block is present, and it can't be disabled from the
    # CLI (the "null" override isn't coerced for this key). The release workflow injects
    # these (public, non-secret) values via -c.win.azureSignOptions.* only when the Azure
    # Trusted Signing creds exist; without them the build falls back to signtool and skips
    # signing gracefully, producing an unsigned installer instead of failing.

# linux

linux:
    asarUnpack:
        - "**/node_modules/grandiose/**"
        - "**/node_modules/macadam/**/*.node"
        - "**/node_modules/libltc-wrapper/**/*"
    category: AudioVideo
    target:
        - AppImage
        - deb
        - rpm
    icon: build/public

deb:
    depends:
        - libfontconfig1
        - uuid-runtime
        - libltc11

# macos

mac:
    icon: build/public/icon.png
    asarUnpack:
        - "**/node_modules/macadam/**/*.node"
    target:
        - target: dmg
          arch:
              - x64
              - arm64
        - target: zip
          arch:
              - x64
              - arm64
    category: public.app-category.utilities
    hardenedRuntime: true
    gatekeeperAssess: false
    notarize: false
    entitlements: scripts/macos/entitlements.mac.plist
    entitlementsInherit: scripts/macos/entitlements.mac.plist
    extendInfo:
        NSMicrophoneUsageDescription: Please give access to your microphone if you want to use it for input.
        NSCameraUsageDescription: Please give access to your camera if you want to use it for input.
        com.apple.security.device.audio-input: true
        com.apple.security.device.camera: true

afterSign: scripts/macos/notarize.js

dmg:
    background: build/public/dmg.png
    sign: false
    contents:
        - x: 140
          y: 150
        - x: 400
          y: 150
          type: link
          path: /Applications
